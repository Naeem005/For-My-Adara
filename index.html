<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A Letter For My Princess ❤️</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- 💖 Hearts -->
<div class="hearts"></div>

<!-- 💌 Envelope -->
<div class="envelope-wrapper" id="envelope">

    <div class="card-container" id="main-card">

        <img id="card-gif"
             src="https://media3.giphy.com/media/v1.Y2lkPTc5MGI3NjExOW5nNXN4YTM4MjE1bHBvaTFtMWNzdHpreXdkdG91dHU5emtyaXZodCZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/IzXiddo2twMmdmU8Lv/giphy.gif"
             alt="gif">

        <h1 id="question">I am very sorry Princess🥺, for the things that i have said that have hurt you. I hope you understand that it was never my intention and I would not let it happen again my gorgeous girl 🥰🤗</h1>

        <!-- 📸 Gallery -->
        <div class="photo-carousel">
            <div class="photo-track">
                <img src="photo1.jpeg" alt="1">
                <img src="photo2.jpeg" alt="2">
                <img src="photo4.jpeg" alt="3">
                <img src="photo3.jpeg" alt="4">
            </div>
        </div>

        <!-- 🔘 Buttons -->
        <div class="button-group">
            <button id="yes-btn">Next ➡️</button>
            <button id="no-btn">No 😭</button>
        </div>

    </div>
</div>

<!-- 🔍 Lightbox -->
<div id="lightbox" class="lightbox">
    <img id="lightbox-img" src="">
</div>

<script src="script.js"></script>
</body>
</html>
