<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A Letter For My Princess ❤️</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- 💖 Floating hearts layer -->
<div class="hearts"></div>

<!-- 💌 Envelope -->
<div class="envelope-wrapper" id="envelope">

    <div class="card-container" id="main-card">

        <img id="card-gif"
             src="https://media.giphy.com/media/MDJ9IbxxvDUQM/giphy.gif"
             alt="Cute GIF">

        <h1 id="question">I am very sorry, Princess 🥺👉👈</h1>

        <!-- 📸 Photo memories -->
    <div class="photo-carousel">
    <div class="photo-track">
        <img src="photo1.jpeg" alt="memory 1">
        <img src="photo2.jpeg" alt="memory 2">
        <img src="photo3.jpeg" alt="memory 3">
        <img src="photo4.jpeg" alt="memory 4">
    </div>
</div>

        <div class="button-group">
            <button id="yes-btn">Next ➡️</button>
            <button id="no-btn">No 😭</button>
        </div>

    </div>

</div>
    

<script src="script.js"></script>
</body>
</html>
